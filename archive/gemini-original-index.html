<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avery Basketball Analytics App</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- HTML2PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Dependencies for Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-is/umd/react-is.production.min.js"></script>
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Print Styles */
        @media print {
            .no-print { display: none !important; }
            .print-friendly { width: 100% !important; max-width: 100% !important; padding: 0 !important; margin: 0 !important; background: white !important;}
            body { background: white; }
            .shadow-md, .shadow-sm { box-shadow: none !important; border: 1px solid #e5e7eb; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        // Check if Recharts loaded correctly
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts || {};

        // --- MOCK DATA SEED ---
        const DEFAULT_GAMES = [
            {
                id: 1, opponent: 'Coyotes', result: 'W 65-42', date: 'Lakes Tournament', videoUrl: '',
                stats: { mins: 12, pts: 8, fgm: 3, fga: 4, tpm: 2, tpa: 2, oreb: 0, dreb: 2, ast: 3, stl: 0, hqpa: 0, ptch: 5, defl: 2, tov: 3, lbTov: 2, pf: 0, plusMinus: 2 },
                playByPlay: ['0:25 Assist, paint touch', '1:32 Paint touch', '1:46 Miss 2 PT, paint touch', '3:50 Make 2 PT, paint touch', '5:30 Make 3 PT', '6:14 Assist', '6:50 LB TOV', '8:12 Def Reb', '8:34 Paint touch', '8:54 Clean entry, assist', '9:50 Def', '10:42 DB TOV', '11:11 LB TOV', '11:27 Def', '11:41 Def Reb', '13:07 Make 3PT']
            },
            {
                id: 2, opponent: 'North Shore', result: 'W 52-51', date: 'Lakes Tournament', videoUrl: '',
                stats: { mins: 9, pts: 0, fgm: 0, fga: 0, tpm: 0, tpa: 0, oreb: 0, dreb: 1, ast: 2, stl: 0, hqpa: 0, ptch: 2, defl: 0, tov: 0, lbTov: 0, pf: 1, plusMinus: 15 },
                playByPlay: ['3:19 Paint touch', '7:09 Paint touch, assist', '7:39 Def reb', '8:52 Clean entry', '13:08 Assist']
            },
            {
                id: 3, opponent: 'Thrive', result: 'L 66-53', date: 'Lakes Tournament', videoUrl: '',
                stats: { mins: 6, pts: 4, fgm: 2, fga: 2, tpm: 0, tpa: 0, oreb: 0, dreb: 1, ast: 1, stl: 1, hqpa: 1, ptch: 1, defl: 0, tov: 2, lbTov: 2, pf: 0, plusMinus: -8 },
                playByPlay: ['1:26 Steal', '3:21 Paint touch, make 2 pt', '5:27 Assist', '8:16 Make 2 pt', '8:39 HQPA', '8:54 Def reb', '9:19 LB TOV', '9:59 LB TOV']
            }
        ];

        // --- UTILITY FUNCTIONS ---
        const getYoutubeId = (url) => {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const parseTime = (str) => {
            const match = str.match(/\[?\s*(\d{1,2}:\d{2})\s*\]?/);
            if (!match) return 0;
            const [m, s] = match[1].split(':');
            return parseInt(m) * 60 + parseInt(s);
        };

        const exportPDF = (elementId, filename, landscape = false) => {
            const element = document.getElementById(elementId);
            const opt = {
                margin:       0.3,
                filename:     filename,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: landscape ? 'landscape' : 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        };

        // --- COMPONENTS ---

        // 1. Dashboard Tab
        const DashboardTab = ({ games }) => {
            const totals = games.reduce((acc, game) => {
                for (let key in game.stats) { acc[key] = (acc[key] || 0) + game.stats[key]; }
                return acc;
            }, {});

            const gms = games.length || 1;
            const eFgTotal = totals.fga > 0 ? ((totals.fgm + 0.5 * totals.tpm) / totals.fga * 100).toFixed(1) : 0;
            const astToTotal = totals.tov > 0 ? (totals.ast / totals.tov).toFixed(2) : totals.ast;

            const calcPer = (stat, mins, base) => mins > 0 ? ((stat / mins) * base).toFixed(1) : 0;

            const StatCard = ({ label, value, sub, bold = false }) => (
                <div className="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center">
                    <span className="text-xs text-gray-500 uppercase tracking-wide">{label}</span>
                    <span className={`text-xl ${bold ? 'font-black text-blue-700' : 'font-bold text-gray-800'} mt-1`}>{value}</span>
                    {sub && <span className="text-xs text-gray-400 mt-1">{sub}</span>}
                </div>
            );

            return (
                <div id="pdf-dashboard" className="print-friendly space-y-6">
                    <div className="flex justify-between items-end no-print">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">Season Averages & Totals</h2>
                            <p className="text-sm text-gray-500">{games.length} Games Logged</p>
                        </div>
                        <button onClick={() => exportPDF('pdf-dashboard', 'Avery_Dashboard.pdf')} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-semibold flex items-center gap-2">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                            Print Dashboard
                        </button>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3">
                        <StatCard label="Total Mins" value={totals.mins || 0} sub={`${(totals.mins / gms).toFixed(1)}/g`} bold />
                        <StatCard label="Total Pts" value={totals.pts || 0} sub={`${(totals.pts / gms).toFixed(1)}/g`} bold />
                        <StatCard label="Shooting" value={`${totals.fgm || 0}/${totals.fga || 0}`} sub={`2PT: ${(totals.fgm||0)-(totals.tpm||0)}/${(totals.fga||0)-(totals.tpa||0)} | 3PT: ${totals.tpm||0}/${totals.tpa||0}`} />
                        <StatCard label="eFG%" value={`${eFgTotal}%`} />
                        <StatCard label="Total Ast" value={totals.ast || 0} sub={`${(totals.ast / gms).toFixed(1)}/g`} bold />
                        <StatCard label="AST/TO" value={astToTotal} />
                        <StatCard label="Paint Tch" value={totals.ptch || 0} sub={`${(totals.ptch / gms).toFixed(1)}/g`} />
                        <StatCard label="Plus/Minus" value={totals.plusMinus > 0 ? `+${totals.plusMinus}` : totals.plusMinus || 0} sub="Cumulative" bold />
                    </div>

                    <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden mt-6">
                        <div className="bg-slate-800 text-white px-4 py-3 flex justify-between items-center">
                            <h3 className="font-bold">Traditional Box Score</h3>
                            <button onClick={() => exportPDF('box-score-table', 'Avery_BoxScore.pdf', true)} className="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded no-print">Print Table (Landscape)</button>
                        </div>
                        <div className="overflow-x-auto" id="box-score-table">
                            <table className="w-full text-sm text-left text-gray-700 whitespace-nowrap">
                                <thead className="text-xs text-gray-500 uppercase bg-gray-50 border-b">
                                    <tr>
                                        <th className="px-3 py-2">Game</th>
                                        <th className="px-3 py-2">MIN</th>
                                        <th className="px-3 py-2">PTS</th>
                                        <th className="px-3 py-2">FGM/A</th>
                                        <th className="px-3 py-2">3PM/A</th>
                                        <th className="px-3 py-2 text-blue-600">eFG%</th>
                                        <th className="px-3 py-2">REB</th>
                                        <th className="px-3 py-2">AST</th>
                                        <th className="px-3 py-2">STL</th>
                                        <th className="px-3 py-2 text-blue-600">PTCH</th>
                                        <th className="px-3 py-2">TOV</th>
                                        <th className="px-3 py-2">LB TO</th>
                                        <th className="px-3 py-2 font-bold text-blue-600">A/TO</th>
                                        <th className="px-3 py-2">PF</th>
                                        <th className="px-3 py-2">+/-</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {games.map((g, i) => {
                                        const efg = g.stats.fga > 0 ? ((g.stats.fgm + 0.5 * g.stats.tpm) / g.stats.fga * 100).toFixed(1) : '-';
                                        const ato = g.stats.tov > 0 ? (g.stats.ast / g.stats.tov).toFixed(2) : g.stats.ast;
                                        return (
                                            <tr key={i} className="border-b hover:bg-gray-50">
                                                <td className="px-3 py-2 font-medium text-gray-900">{g.opponent}</td>
                                                <td className="px-3 py-2">{g.stats.mins}</td>
                                                <td className="px-3 py-2 font-bold">{g.stats.pts}</td>
                                                <td className="px-3 py-2">{g.stats.fgm}/{g.stats.fga}</td>
                                                <td className="px-3 py-2">{g.stats.tpm}/{g.stats.tpa}</td>
                                                <td className="px-3 py-2 text-blue-700 font-medium">{efg}{efg !== '-' && '%'}</td>
                                                <td className="px-3 py-2">{g.stats.oreb + g.stats.dreb}</td>
                                                <td className="px-3 py-2">{g.stats.ast}</td>
                                                <td className="px-3 py-2">{g.stats.stl}</td>
                                                <td className="px-3 py-2 font-medium">{g.stats.ptch}</td>
                                                <td className="px-3 py-2">{g.stats.tov}</td>
                                                <td className="px-3 py-2">{g.stats.lbTov}</td>
                                                <td className="px-3 py-2 font-bold text-blue-700">{ato}</td>
                                                <td className="px-3 py-2">{g.stats.pf}</td>
                                                <td className={`px-3 py-2 font-bold ${g.stats.plusMinus > 0 ? 'text-green-600' : g.stats.plusMinus < 0 ? 'text-red-600' : ''}`}>
                                                    {g.stats.plusMinus > 0 ? '+' : ''}{g.stats.plusMinus}
                                                </td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                                <tfoot className="bg-gray-100 font-bold border-t-2 border-gray-300">
                                    <tr>
                                        <td className="px-3 py-3">TOTALS</td>
                                        <td className="px-3 py-3">{totals.mins}</td>
                                        <td className="px-3 py-3 text-blue-700">{totals.pts}</td>
                                        <td className="px-3 py-3">{totals.fgm}/{totals.fga}</td>
                                        <td className="px-3 py-3">{totals.tpm}/{totals.tpa}</td>
                                        <td className="px-3 py-3 text-blue-700">{eFgTotal}%</td>
                                        <td className="px-3 py-3">{(totals.oreb||0) + (totals.dreb||0)}</td>
                                        <td className="px-3 py-3">{totals.ast}</td>
                                        <td className="px-3 py-3">{totals.stl}</td>
                                        <td className="px-3 py-3">{totals.ptch}</td>
                                        <td className="px-3 py-3">{totals.tov}</td>
                                        <td className="px-3 py-3">{totals.lbTov}</td>
                                        <td className="px-3 py-3 text-blue-700">{astToTotal}</td>
                                        <td className="px-3 py-3">{totals.pf}</td>
                                        <td className={`px-3 py-3 ${totals.plusMinus > 0 ? 'text-green-600' : totals.plusMinus < 0 ? 'text-red-600' : ''}`}>{totals.plusMinus > 0 ? '+' : ''}{totals.plusMinus}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                            <div className="bg-blue-50 border-b border-blue-100 px-4 py-2"><h3 className="font-bold text-blue-800">Per 24 Minutes</h3></div>
                            <div className="p-4 grid grid-cols-4 gap-4 text-center">
                                <div><div className="text-xl font-bold">{calcPer(totals.pts, totals.mins, 24)}</div><div className="text-xs text-gray-500 uppercase">PTS</div></div>
                                <div><div className="text-xl font-bold">{calcPer(totals.ast, totals.mins, 24)}</div><div className="text-xs text-gray-500 uppercase">AST</div></div>
                                <div><div className="text-xl font-bold">{calcPer((totals.oreb||0)+(totals.dreb||0), totals.mins, 24)}</div><div className="text-xs text-gray-500 uppercase">REB</div></div>
                                <div><div className="text-xl font-bold">{calcPer(totals.ptch, totals.mins, 24)}</div><div className="text-xs text-gray-500 uppercase">PTCH</div></div>
                            </div>
                        </div>
                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                            <div className="bg-slate-50 border-b border-slate-200 px-4 py-2"><h3 className="font-bold text-slate-800">Per 32 Minutes</h3></div>
                            <div className="p-4 grid grid-cols-4 gap-4 text-center">
                                <div><div className="text-xl font-bold">{calcPer(totals.pts, totals.mins, 32)}</div><div className="text-xs text-gray-500 uppercase">PTS</div></div>
                                <div><div className="text-xl font-bold">{calcPer(totals.ast, totals.mins, 32)}</div><div className="text-xs text-gray-500 uppercase">AST</div></div>
                                <div><div className="text-xl font-bold">{calcPer((totals.oreb||0)+(totals.dreb||0), totals.mins, 32)}</div><div className="text-xs text-gray-500 uppercase">REB</div></div>
                                <div><div className="text-xl font-bold">{calcPer(totals.ptch, totals.mins, 32)}</div><div className="text-xs text-gray-500 uppercase">PTCH</div></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 2. Game Logs Tab
        const LogsTab = ({ games, updateGameUrl }) => {
            return (
                <div className="space-y-6">
                    <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded">
                        <h3 className="font-bold text-blue-800">Film Integration</h3>
                        <p className="text-sm text-blue-700 mt-1">Paste a YouTube link into any game card below. The timestamps in the play-by-play will instantly become clickable links that jump right to the action, and populate the "Smart Film Room" tab!</p>
                    </div>
                    {games.map((g) => {
                        const ytId = getYoutubeId(g.videoUrl);
                        return (
                            <div key={g.id} className="bg-white p-5 rounded-lg shadow-sm border border-gray-200">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-3 mb-4">
                                    <div>
                                        <h3 className="text-xl font-bold text-gray-800">Game {g.id}: vs {g.opponent}</h3>
                                        <p className="text-sm text-gray-500">{g.date} | Result: <span className="font-semibold">{g.result}</span> | Mins: {g.stats.mins}</p>
                                    </div>
                                    <div className="mt-3 md:mt-0 w-full md:w-auto">
                                        <input 
                                            type="text" 
                                            placeholder="Paste YouTube Link here..." 
                                            value={g.videoUrl || ''}
                                            onChange={(e) => updateGameUrl(g.id, e.target.value)}
                                            className="w-full md:w-64 text-sm px-3 py-2 border rounded-md focus:ring focus:ring-blue-200 focus:outline-none"
                                        />
                                    </div>
                                </div>
                                <div className="text-sm font-mono bg-slate-50 p-4 rounded-md border border-slate-100 h-64 overflow-y-auto">
                                    {g.playByPlay && g.playByPlay.length > 0 ? g.playByPlay.map((play, idx) => {
                                        const timeMatch = play.match(/\[?\s*(\d{1,2}:\d{2})\s*\]?/);
                                        const timeStr = timeMatch ? timeMatch[1] : null;
                                        const sec = timeStr ? parseTime(timeStr) : 0;
                                        
                                        return (
                                            <div key={idx} className="mb-2 pl-2 border-l-2 border-gray-300 flex items-start gap-2">
                                                {timeStr && ytId ? (
                                                    <a 
                                                        href={`https://www.youtube.com/watch?v=${ytId}&t=${sec}s`} 
                                                        target="_blank" 
                                                        className="text-blue-600 font-bold hover:underline shrink-0 bg-blue-100 px-1 rounded"
                                                    >
                                                        [{timeStr}]
                                                    </a>
                                                ) : timeStr ? (
                                                    <span className="text-gray-500 font-bold shrink-0">[{timeStr}]</span>
                                                ) : null}
                                                <span className="text-gray-700">{play.replace(/\[?\s*\d{1,2}:\d{2}\s*\]?/, '').trim()}</span>
                                            </div>
                                        );
                                    }) : <p className="text-gray-400 italic">No play-by-play logged.</p>}
                                </div>
                            </div>
                        )
                    })}
                </div>
            );
        };

        // 3. Benchmarks Tab
        const BenchmarksTab = ({ games }) => {
            const totals = games.reduce((acc, game) => {
                for (let key in game.stats) { acc[key] = (acc[key] || 0) + game.stats[key]; }
                return acc;
            }, {});
            const gms = games.length || 1;
            
            const current = {
                mins: (totals.mins / gms),
                pts: (totals.pts / gms),
                tpPct: totals.tpa > 0 ? (totals.tpm / totals.tpa * 100) : 0,
                tpa: (totals.tpa / gms),
                ast: (totals.ast / gms),
                astHqpa: ((totals.ast + (totals.hqpa||0)) / gms),
                ptch: (totals.ptch / gms),
                reb: (((totals.oreb||0) + (totals.dreb||0)) / gms),
                defl: ((totals.defl||0) / gms),
                tov: (totals.tov / gms),
                lbTov: ((totals.lbTov||0) / gms),
                astTo: totals.tov > 0 ? (totals.ast / totals.tov) : totals.ast
            };

            const Row = ({ label, currentVal, target4, target12, isKey = false, isLowerBetter = false, format = '' }) => {
                let statusColor = "bg-gray-100";
                const v = parseFloat(currentVal);
                const t = parseFloat(target12.replace(/[^0-9.]/g, '')); // roughly extract number
                
                if (!isNaN(v) && !isNaN(t)) {
                    if (isLowerBetter) {
                        statusColor = v <= t ? "bg-green-100 text-green-800 font-bold" : (v <= t + 1 ? "bg-yellow-100" : "bg-red-50 text-red-800");
                    } else {
                        statusColor = v >= t ? "bg-green-100 text-green-800 font-bold" : (v >= t * 0.75 ? "bg-yellow-100" : "bg-gray-50 text-gray-500");
                    }
                }

                return (
                    <tr className={`border-b ${isKey ? 'bg-blue-50/50' : ''}`}>
                        <td className="px-4 py-3 font-medium flex items-center gap-2">
                            {isKey && <span className="w-2 h-2 rounded-full bg-blue-500"></span>}
                            {label}
                        </td>
                        <td className={`px-4 py-3 text-center ${statusColor}`}>{v.toFixed(1)}{format}</td>
                        <td className="px-4 py-3 text-center text-gray-600">{target4}</td>
                        <td className={`px-4 py-3 text-center font-bold ${isKey ? 'text-blue-700' : 'text-gray-800'}`}>{target12}</td>
                    </tr>
                );
            };

            return (
                <div className="space-y-6 max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-sm">
                    <div>
                        <h2 className="text-2xl font-bold text-gray-800">Development Benchmarks</h2>
                        <p className="text-gray-500 text-sm">Tracking current season averages vs 4-month and 12-month goals.</p>
                        <div className="mt-4 flex gap-4 text-xs">
                            <span className="flex items-center gap-1"><span className="w-3 h-3 bg-green-100 inline-block rounded"></span> On Track (12mo)</span>
                            <span className="flex items-center gap-1"><span className="w-3 h-3 bg-yellow-100 inline-block rounded"></span> Approaching</span>
                            <span className="flex items-center gap-1"><span className="w-3 h-3 bg-blue-500 inline-block rounded-full"></span> Key Indicator</span>
                        </div>
                    </div>

                    <table className="w-full text-sm text-left">
                        <thead className="bg-gray-800 text-white">
                            <tr>
                                <th className="px-4 py-3 rounded-tl-md">Metric</th>
                                <th className="px-4 py-3 text-center">Current Avg</th>
                                <th className="px-4 py-3 text-center">4-Month Target</th>
                                <th className="px-4 py-3 text-center rounded-tr-md">12-Month Target</th>
                            </tr>
                        </thead>
                        <tbody>
                            <Row label="Minutes" currentVal={current.mins} target4="16+" target12="18 - 24" />
                            <Row label="Points" currentVal={current.pts} target4="6 - 10" target12="8 - 14" />
                            <Row label="3PT Attempts" currentVal={current.tpa} target4="2 - 4" target12="3 - 5" isKey />
                            <Row label="3PT %" currentVal={current.tpPct} target4="35%+" target12="35 - 38%+" format="%" isKey />
                            <Row label="Assists" currentVal={current.ast} target4="2 - 4" target12="3 - 5" />
                            <Row label="AST + HQPA" currentVal={current.astHqpa} target4="3 - 6" target12="5+" isKey />
                            <Row label="Paint Touches" currentVal={current.ptch} target4="3 - 5" target12="5+" isKey />
                            <Row label="Rebounds" currentVal={current.reb} target4="3 - 5" target12="4 - 6" />
                            <Row label="Deflections" currentVal={current.defl} target4="2 - 4" target12="4+" />
                            <Row label="Turnovers" currentVal={current.tov} target4="≤ 2" target12="≤ 2" isLowerBetter />
                            <Row label="Initiator LB TOV" currentVal={current.lbTov} target4="≤ 0.5" target12="Near Zero" isKey isLowerBetter />
                            <Row label="AST:TO Ratio" currentVal={current.astTo} target4="1.5:1" target12="2:1+" />
                        </tbody>
                    </table>
                </div>
            );
        };

        // 4. SMART FILM ROOM (New Tab)
        const FilmRoomTab = ({ games }) => {
            const [filter, setFilter] = useState('All');
            const [currentClip, setCurrentClip] = useState(null);

            // Extract all clips from all games
            const allClips = useMemo(() => {
                return games.reduce((acc, game) => {
                    const videoId = getYoutubeId(game.videoUrl);
                    if (!videoId) return acc; // Skip games without video

                    const clips = (game.playByPlay || []).map((play, index) => {
                        const match = play.match(/\[?\s*(\d{1,2}:\d{2})\s*\]?\s*(.*)/);
                        if (match) {
                            const timeStr = match[1];
                            const desc = match[2];
                            return {
                                id: `${game.id}-${index}`,
                                gameId: game.id,
                                opponent: game.opponent,
                                videoId: videoId,
                                timeStr: timeStr,
                                seconds: parseTime(timeStr),
                                rawDesc: desc,
                                descLower: desc.toLowerCase()
                            };
                        }
                        return null;
                    }).filter(Boolean);

                    return [...acc, ...clips];
                }, []);
            }, [games]);

            // Filter logic
            const filters = ['All', 'Make', 'Miss', 'Assist', 'Paint Touch', 'Turnover', 'Reb/Def', 'Steal'];
            
            const filteredClips = useMemo(() => {
                return allClips.filter(clip => {
                    if (filter === 'All') return true;
                    if (filter === 'Make') return clip.descLower.includes('make');
                    if (filter === 'Miss') return clip.descLower.includes('miss');
                    if (filter === 'Assist') return clip.descLower.includes('assist') || clip.descLower.includes('hqpa');
                    if (filter === 'Paint Touch') return clip.descLower.includes('paint touch') || clip.descLower.includes('ptch');
                    if (filter === 'Turnover') return clip.descLower.includes('tov') || clip.descLower.includes('turnover');
                    if (filter === 'Reb/Def') return clip.descLower.includes('reb') || clip.descLower.includes('def');
                    if (filter === 'Steal') return clip.descLower.includes('steal');
                    return true;
                });
            }, [allClips, filter]);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-[85vh]">
                    
                    {/* LEFT: Video Player */}
                    <div className="lg:col-span-2 flex flex-col h-full">
                        <div className="bg-slate-900 rounded-xl overflow-hidden shadow-xl flex-1 flex flex-col">
                            {currentClip ? (
                                <>
                                    <iframe
                                        className="w-full flex-1 min-h-[300px]"
                                        src={`https://www.youtube.com/embed/${currentClip.videoId}?start=${currentClip.seconds > 3 ? currentClip.seconds - 3 : currentClip.seconds}&autoplay=1`}
                                        frameBorder="0"
                                        allow="autoplay; encrypted-media; picture-in-picture"
                                        allowFullScreen
                                    ></iframe>
                                    <div className="bg-slate-800 text-white p-4 shrink-0">
                                        <div className="flex justify-between items-center">
                                            <h3 className="font-bold text-xl">{currentClip.rawDesc}</h3>
                                            <span className="bg-blue-600 text-xs font-bold px-2 py-1 rounded">Game {currentClip.gameId}</span>
                                        </div>
                                        <p className="text-slate-400 text-sm mt-1">vs {currentClip.opponent} @ {currentClip.timeStr}</p>
                                    </div>
                                </>
                            ) : (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-500 p-8 text-center min-h-[400px]">
                                    <svg className="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                    <h2 className="text-2xl font-bold text-slate-400 mb-2">Smart Film Room</h2>
                                    <p className="max-w-md">Select a clip from the playlist on the right to start watching. Ensure you have added YouTube URLs in the "Game Logs" tab.</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* RIGHT: Playlist Sidebar */}
                    <div className="bg-white rounded-xl shadow-md flex flex-col h-full border border-gray-200">
                        <div className="p-4 border-b border-gray-100 shrink-0">
                            <h2 className="text-xl font-bold text-gray-800 mb-3">Automated Playlist</h2>
                            <div className="flex flex-wrap gap-2">
                                {filters.map(f => (
                                    <button
                                        key={f}
                                        onClick={() => setFilter(f)}
                                        className={`px-3 py-1.5 text-xs font-bold rounded-full transition-colors ${filter === f ? 'bg-blue-600 text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                                    >
                                        {f}
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-2 bg-gray-50">
                            {allClips.length === 0 ? (
                                <div className="text-center p-6 text-gray-400 text-sm">
                                    No clips available. Go to the Game Logs tab and paste a YouTube link into a game card.
                                </div>
                            ) : filteredClips.length === 0 ? (
                                <div className="text-center p-6 text-gray-400 text-sm">
                                    No "{filter}" clips found in the logged video games.
                                </div>
                            ) : (
                                <div className="space-y-2">
                                    {filteredClips.map((clip, idx) => {
                                        const isActive = currentClip && currentClip.id === clip.id;
                                        return (
                                            <div 
                                                key={clip.id}
                                                onClick={() => setCurrentClip(clip)}
                                                className={`p-3 rounded-lg cursor-pointer border transition-all flex gap-3 ${isActive ? 'bg-blue-50 border-blue-400 shadow-sm' : 'bg-white border-gray-200 hover:border-blue-300 hover:shadow-sm'}`}
                                            >
                                                <div className={`w-12 h-12 shrink-0 rounded flex flex-col items-center justify-center font-mono font-bold text-xs ${isActive ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'}`}>
                                                    <span>{clip.timeStr}</span>
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <p className={`font-semibold truncate text-sm ${isActive ? 'text-blue-900' : 'text-gray-800'}`}>{clip.rawDesc}</p>
                                                    <p className="text-xs text-gray-500 mt-1 truncate">Game {clip.gameId} vs {clip.opponent}</p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                        <div className="p-3 bg-gray-100 border-t border-gray-200 text-xs text-center text-gray-500 font-medium shrink-0">
                            {filteredClips.length} clips found for "{filter}"
                        </div>
                    </div>

                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('Dashboard');
            const [games, setGames] = useState(() => {
                const saved = localStorage.getItem('averyGames');
                return saved ? JSON.parse(saved) : DEFAULT_GAMES;
            });

            // Save to localStorage whenever games change
            useEffect(() => {
                localStorage.setItem('averyGames', JSON.stringify(games));
            }, [games]);

            const updateGameUrl = (gameId, url) => {
                setGames(games.map(g => g.id === gameId ? { ...g, videoUrl: url } : g));
            };

            const TABS = ['Dashboard', 'Game Logs', 'Benchmarks', 'Smart Film Room'];

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-slate-900 text-white py-6 px-4 md:px-8 shadow-md no-print">
                        <div className="max-w-7xl mx-auto">
                            <h1 className="text-3xl font-black tracking-tight flex items-center gap-3">
                                <span className="bg-blue-600 text-white px-2 py-1 rounded text-xl">#</span>
                                Avery Analytics Pro
                            </h1>
                            <p className="text-slate-400 mt-1">Player Development & Video System</p>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="bg-white border-b border-gray-200 px-4 md:px-8 no-print sticky top-0 z-10 shadow-sm">
                        <div className="max-w-7xl mx-auto flex overflow-x-auto hide-scrollbar">
                            {TABS.map(tab => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`whitespace-nowrap px-6 py-4 font-semibold text-sm transition-colors border-b-2 ${activeTab === tab ? 'border-blue-600 text-blue-700' : 'border-transparent text-gray-500 hover:text-gray-800 hover:border-gray-300'}`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-grow p-4 md:p-8 max-w-7xl mx-auto w-full">
                        {activeTab === 'Dashboard' && <DashboardTab games={games} />}
                        {activeTab === 'Game Logs' && <LogsTab games={games} updateGameUrl={updateGameUrl} />}
                        {activeTab === 'Benchmarks' && <BenchmarksTab games={games} />}
                        {activeTab === 'Smart Film Room' && <FilmRoomTab games={games} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
