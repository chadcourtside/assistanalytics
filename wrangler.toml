name = "assistanalytics"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# Create the database in Cloudflare dashboard, then replace database_id below.
# Local dev: wrangler d1 execute assistanalytics --local --file=./migrations/0001_init.sql
[[d1_databases]]
binding = "DB"
database_name = "assistanalytics"
database_id = "e0fd078f-d500-49ed-8d15-679280b741bc"

[vars]
# Override in production via Dashboard → Settings → Environment variables
# SESSION_SECRET = "generate-a-long-random-string"
